name: Auto-approve fusion schema sync PRs

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-approve:
    if: >-
      github.event.pull_request.user.login == 'fa-assistant' &&
      startsWith(github.event.pull_request.head.ref, 'sync-fusion-schemas-')
    runs-on: ubuntu-latest
    steps:
      - name: Approve PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --approve

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --auto --merge
